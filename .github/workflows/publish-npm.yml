name: Publish to NPM

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish valor-fireplace-cli to NPM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x. OIDC trusted publishing requires
          # npm >= 11.5.1 — node 22's bundled npm 10.9.x signs provenance but
          # cannot authenticate the publish without a legacy NPM_TOKEN.
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Print npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci

      - name: Assert tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to NPM (OIDC trusted publishing)
        run: npm publish --provenance --access public

      - name: Verify
        run: npm view valor-fireplace-cli version
